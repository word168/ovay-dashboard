<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>澳维液体膜 · 国内市场数据监控</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap');

:root {
  --bg-deep: #061126;
  --glass: rgba(6, 20, 50, 0.65);
  --cyan: #00E5FF;
  --blue: #2979FF;
  --purple: #7C4DFF;
  --border-glow: rgba(0, 229, 255, 0.25);
  --text: #c8d6e5;
  --text-dim: #5a6f8a;
  --danger: #ff5252;
  --success: #00e676;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: var(--bg-deep);
  font-family: 'Orbitron', 'Microsoft YaHei', 'PingFang SC', sans-serif;
  color: var(--text);
  position: relative;
}

body::before {
  content: ''; position: fixed; top:0; left:0; width:100%; height:100%;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: ''; position: fixed; top:0; left:0; width:100%; height:100%;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 3px);
  pointer-events: none; z-index: 999; opacity: 0.3;
}

#app {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex; gap: 12px; padding: 8px 12px;
}

/* LEFT COLUMN */
#left-col {
  width: 480px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 6px;
}
#panel-sales   { flex: 144; }
#panel-region  { flex: 144; }
#panel-ranking { flex: 8; min-height: 240px; }

/* RIGHT COLUMN */
#right-col {
  flex: 1;
  display: flex; flex-direction: column; gap: 10px;
}

/* KPI ROW */
#kpi-row {
  display: flex; gap: 8px; padding: 0; flex-shrink: 0;
}
.kpi-card {
  flex: 1; background: var(--glass);
  border: 1px solid var(--border-glow); border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden; padding: 14px 0;
  backdrop-filter: blur(8px);
}
.kpi-card::after {
  content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
}
.kpi-val { font-size: 20px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(0,229,255,0.5); letter-spacing: 1px; }
.kpi-label { font-size: 9px; color: var(--text-dim); margin-top: 2px; letter-spacing: 1px; }
.kpi-change { font-size: 8px; margin-top: 1px; }
.kpi-change.up { color: var(--success); }
.kpi-change.down { color: var(--danger); }

/* PANELS */
.panel {
  background: var(--glass);
  border: 1px solid var(--border-glow);
  border-radius: 8px;
  position: relative; overflow: hidden;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex; flex-direction: column;
}
.panel::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.6;
}
.panel::after {
  content: ''; position: absolute; bottom: 0; right: 0;
  width: 20px; height: 20px;
  border-right: 2px solid var(--border-glow);
  border-bottom: 2px solid var(--border-glow);
  opacity: 0.5;
}
.panel-hd {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px 5px;
  font-size: 12px; font-weight: 600; color: var(--cyan);
  letter-spacing: 1.5px; flex-shrink: 0;
}
.panel-hd .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan), 0 0 16px var(--cyan);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.panel-body { flex: 1; position: relative; overflow: hidden; }

/* CHINA MAP PANEL */
#panel-map { flex: 1; }

/* RANKING */
.rank-list { padding: 6px 12px 12px; }
.rank-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px; margin-bottom: 3px; border-radius: 4px;
  background: rgba(0,229,255,0.03); transition: 0.2s;
}
.rank-item:hover { background: rgba(0,229,255,0.08); }
.rank-badge {
  width: 26px; height: 26px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: #fff;
}
.rank-badge.gold { background: linear-gradient(135deg, #ffd700, #ff8c00); }
.rank-badge.silver { background: linear-gradient(135deg, #c0c0c0, #8a8a8a); }
.rank-badge.bronze { background: linear-gradient(135deg, #cd7f32, #a0522d); }
.rank-badge.normal { background: rgba(0,229,255,0.2); color: var(--cyan); }
.rank-name { flex: 1; font-size: 12px; color: #e8edf5; }
.rank-pct { font-size: 12px; font-weight: 700; color: var(--cyan); text-shadow: 0 0 6px rgba(0,229,255,0.3); }
.rank-bar-wrap { width: 90px; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.rank-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--cyan), var(--blue)); }
</style>
</head>
<body>
<div id="app">

  <!-- ==================== LEFT COLUMN ==================== -->
  <div id="left-col">

    <div class="panel" id="panel-sales">
      <div class="panel-hd"><span class="dot"></span>国内总销售额趋势 (2018-2026)</div>
      <div class="panel-body"><div id="chart-sales" style="width:100%;height:100%;"></div></div>
    </div>

    <div class="panel" id="panel-region">
      <div class="panel-hd"><span class="dot"></span>各地区月度销售额 (2026)</div>
      <div class="panel-body"><div id="chart-region" style="width:100%;height:100%;"></div></div>
    </div>

    <div class="panel" id="panel-ranking">
      <div class="panel-hd"><span class="dot"></span>销售额省份排行 TOP 5</div>
      <div class="panel-body"><div class="rank-list" id="rank-list"></div></div>
    </div>
  </div>

  <!-- ==================== RIGHT COLUMN ==================== -->
  <div id="right-col">

    <div id="kpi-row">
      <div class="kpi-card"><div class="kpi-val">¥1,856万</div><div class="kpi-label">国内月销售额</div><div class="kpi-change up">▲ 10.2%</div></div>
      <div class="kpi-card"><div class="kpi-val">22.8%</div><div class="kpi-label">国内净利率</div><div class="kpi-change up">▲ 1.8%</div></div>
      <div class="kpi-card"><div class="kpi-val">95.1%</div><div class="kpi-label">回款准时率</div><div class="kpi-change up">▲ 0.6%</div></div>
      <div class="kpi-card"><div class="kpi-val">112</div><div class="kpi-label">国内活跃客户</div><div class="kpi-change up">▲ 5家</div></div>
      <div class="kpi-card"><div class="kpi-val">0.85</div><div class="kpi-label">公信力均值</div><div class="kpi-change up">▲ 0.04</div></div>
    </div>

    <!-- China Map -->
    <div class="panel" id="panel-map">
      <div class="panel-hd"><span class="dot"></span>中国市场销售分布</div>
      <div class="panel-body"><div id="chart-map" style="width:100%;height:100%;"></div></div>
    </div>

  </div>

</div>

<script>
var years = ['2018','2019','2020','2021','2022','2023','2024','2025','2026'];
var salesData = [310, 345, 285, 398, 462, 520, 575, 632, 685];
var salesTarget = [300, 330, 350, 400, 450, 500, 550, 600, 650];

var months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var regions = [
  { name: '华北战区', data: months.map(function(){ return Math.round(120+Math.random()*80); }), color: '#00E5FF' },
  { name: '华东战区', data: months.map(function(){ return Math.round(160+Math.random()*100); }), color: '#2979FF' },
  { name: '南部战区', data: months.map(function(){ return Math.round(100+Math.random()*70); }), color: '#7C4DFF' },
  { name: '西北战区', data: months.map(function(){ return Math.round(50+Math.random()*50); }), color: '#FF6D00' },
];

var topProvinces = [
  { name: '广东', pct: 18.5, value: 343 },
  { name: '江苏', pct: 15.2, value: 282 },
  { name: '浙江', pct: 12.8, value: 237 },
  { name: '山东', pct: 9.6,  value: 178 },
  { name: '上海', pct: 7.3,  value: 135 },
];

var chinaCities = ['北京','上海','广州','深圳','杭州','南京','武汉','成都','重庆','西安','长沙','郑州','济南','青岛','天津','苏州','东莞','佛山','合肥','福州','株洲','湘潭','衡阳','岳阳','常德','温州','宁波','厦门','南昌','昆明','石家庄','哈尔滨'];

// Module 1: Sales Line
(function(){
  var c = echarts.init(document.getElementById('chart-sales'));
  c.setOption({
    tooltip: { trigger:'axis', backgroundColor:'rgba(6,20,50,0.9)', borderColor:'#00E5FF', textStyle:{color:'#c8d6e5',fontSize:11} },
    legend: { right:6, top:2, textStyle:{color:'#5a6f8a',fontSize:10}, data:['国内销售额','目标线'] },
    grid: { left:52, right:14, top:40, bottom:40 },
    xAxis: { type:'category', data:years, axisLine:{lineStyle:{color:'rgba(0,229,255,0.2)'}}, axisLabel:{color:'#5a6f8a',fontSize:11}, axisTick:{show:false} },
    yAxis: { type:'value', name:'亿元', nameTextStyle:{color:'#5a6f8a',fontSize:11}, splitLine:{lineStyle:{color:'rgba(0,229,255,0.06)'}}, axisLabel:{color:'#5a6f8a',fontSize:11, margin:12} },
    series: [
      { name:'国内销售额', type:'line', data:salesData, smooth:true, symbol:'circle', symbolSize:7,
        lineStyle:{width:3, shadowBlur:10, shadowColor:'rgba(0,229,255,0.5)'},
        itemStyle:{color:'#00E5FF', borderColor:'#fff', borderWidth:2},
        areaStyle:{color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(0,229,255,0.3)'},{offset:1,color:'rgba(0,229,255,0.0)'}])}
      },
      { name:'目标线', type:'line', data:salesTarget, lineStyle:{color:'rgba(124,77,255,0.6)',type:'dashed',width:1.5}, symbol:'none' }
    ]
  });
})();

// Module 2: Region Stacked Bar
(function(){
  var c = echarts.init(document.getElementById('chart-region'));
  var series = regions.map(function(r) { return { name:r.name, type:'bar', stack:'total', data:r.data, itemStyle:{color:r.color}, barWidth:'55%' }; });
  c.setOption({
    tooltip: { trigger:'axis', backgroundColor:'rgba(6,20,50,0.9)', borderColor:'#00E5FF', textStyle:{color:'#c8d6e5',fontSize:11} },
    legend: { bottom:2, textStyle:{color:'#5a6f8a',fontSize:9}, itemWidth:10, itemHeight:8 },
    grid: { left:42, right:10, top:18, bottom:48 },
    xAxis: { type:'category', data:months, axisLine:{lineStyle:{color:'rgba(0,229,255,0.2)'}}, axisLabel:{color:'#5a6f8a',fontSize:10} },
    yAxis: { type:'value', name:'万元', nameTextStyle:{color:'#5a6f8a',fontSize:11}, splitLine:{lineStyle:{color:'rgba(0,229,255,0.06)'}}, axisLabel:{color:'#5a6f8a',fontSize:11, margin:12} },
    series: series
  });
})();

// Module 3: Ranking
(function(){
  var html = '';
  topProvinces.forEach(function(c, i) {
    var cls = i===0?'gold':i===1?'silver':i===2?'bronze':'normal';
    html += '<div class="rank-item">'+
      '<div class="rank-badge '+cls+'">NO.'+(i+1)+'</div>'+
      '<span class="rank-name">'+c.name+'</span>'+
      '<div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:'+(c.pct*2.5)+'%"></div></div>'+
      '<span class="rank-pct">'+c.pct+'%</span></div>';
  });
  document.getElementById('rank-list').innerHTML = html;
})();

// Module 4: China Map
(function(){
  var dom = document.getElementById('chart-map');
  var c = echarts.init(dom);
  function renderChinaMap() {
    var data = chinaCities.map(function(ct) { return { name:ct, value:Math.round(15+Math.random()*500) }; });
    c.setOption({
      tooltip: { trigger:'item', backgroundColor:'rgba(6,20,50,0.92)', borderColor:'#00E5FF', textStyle:{color:'#e8edf5',fontSize:12}, formatter:function(p){ return '<b>'+p.name+'</b><br/>年销售额: <b style="color:#00E5FF">¥'+(p.value||'--')+'万</b>'; } },
      visualMap: { min:15, max:515, left:'left', bottom:8, text:['高','低'], inRange:{color:['#0b1e40','#13305c','#1a4478','#235a96','#2d72b8','#3a8cdc','#4ea8ff','#00E5FF']}, calculable:true, textStyle:{color:'#64748b',fontSize:11} },
      series: [{ type:'map', map:'china', roam:true, zoom:1.2, center:[105,37], label:{show:false}, itemStyle:{borderColor:'rgba(0,229,255,0.3)',borderWidth:0.8}, emphasis:{label:{show:true,fontSize:10,color:'#fff'},itemStyle:{areaColor:'#fbbf24',borderColor:'#fff',borderWidth:1.5}}, data:data }]
    });
  }

  // Load china geoJSON
  fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json').then(function(r){ return r.json(); }).then(function(geo){
    echarts.registerMap('china', geo);
    renderChinaMap();
  }).catch(function(){
    // Fallback
    c.setOption({
      title: { text:'中国地图数据加载中...', left:'center', top:'45%', textStyle:{color:'#5a6f8a',fontSize:14} }
    });
  });
})();
</script>
</body>
</html>
